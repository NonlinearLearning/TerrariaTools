name: dome-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore dome.sln /p:RestoreIgnoreFailedSources=true

      - name: Test core CPG
        run: dotnet test src/Core/CPG/Tests/JoernishCpg.Tests.csproj --no-restore /p:RestoreIgnoreFailedSources=true

      - name: Test Dome suite
        run: dotnet test tests/Dome.Tests/Dome.Tests.csproj --no-restore /p:RestoreIgnoreFailedSources=true
